spring:
  application:
    name: sigma-bb
  profiles:
    active: ${SPRING_PROFILE:default}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres17}:${POSTGRES_PORT:5432}/${POSTGRES_DB:sigma_db}
    username: ${POSTGRES_ROOT_USER:postgres}
    password: ${POSTGRES_ROOT_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  jpa:
    hibernate:
      ddl-auto: none

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/employee-realm
  
logging:
  level:
    org:
      hibernate:
        SQL: debug

app:
  security:
    enabled: false
springdoc:
  swagger-ui:
    path: /swagger-ui.html

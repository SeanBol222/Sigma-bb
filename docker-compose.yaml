services:
  postgres17:
    container_name: postgres17
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - ./DataBase/data:/var/lib/postgresql/data
      - ./DataBase/initdb:/docker-entrypoint-initdb.d
    networks:
      - sigma-bb-network
    restart: always

  pgadmin:
    container_name: pgAdmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 12345678
    ports:
      - "80:80"
    networks:
      - sigma-bb-network
    restart: always

  rabbitmq:
    container_name: rabbitmq-server
    image: rabbitmq:4.1.5-management-alpine
    ports:
      - "${RABBITMQ_HOST_PORT}:${RABBITMQ_PORT}"
      - "${RABBITMQ_MGMT_HOST_PORT}:${RABBITMQ_MGMT_PORT}"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - sigma-bb-network
    restart: always

  bolivarbioingenieria-app:
    container_name: bolivarbioingenieria-app
    build:
      context: ./Backend/sigma-bb/
      dockerfile: Dockerfile
    ports:
      - "${SIGMA_HOST_PORT}:${SIGMA_PORT}"
    environment:
      SPRING_PROFILE: docker
      PORT: ${SIGMA_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_ROOT_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_ROOT_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    networks:
      - sigma-bb-network
    depends_on:
      postgres17:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: always


volumes:
  data-postgres:
    name: data-postgres

networks:
  sigma-bb-network:
    driver: bridge
